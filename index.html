<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg"></div>

<div class="app">

  <div class="top">
    <h1>Weather App</h1>
    <p class="subtitle">Live Wetter weltweit</p>
  </div>

  <div class="search-box">
    <input
      type="text"
      id="city"
      placeholder="Stadt suchen..."
      autocomplete="off"
      oninput="showSuggestions()"
    >

    <button onclick="getWeather()">🔍</button>
    <button onclick="useCurrentLocation()">📍</button>
  </div>

  <div id="suggestions" class="glass-box" style="display:none; margin-bottom:20px;"></div>

  <div class="quick-buttons">
    <button onclick="setCity('Berlin')">Berlin</button>
    <button onclick="setCity('London')">London</button>
    <button onclick="setCity('Tokyo')">Tokyo</button>
    <button onclick="toggleTheme()">🌙</button>
  </div>

  <div id="weather" class="weather-card"></div>

  <div class="extra-grid">

    <div class="glass-box">
      <h3>⚡ Status</h3>
      <p id="statusText">Live Wetterdaten aktiv</p>
    </div>

    <div class="glass-box">
      <h3>🕒 Uhrzeit</h3>
      <p id="clock"></p>
    </div>

    <div class="glass-box">
      <h3>⭐ Favoriten</h3>
      <div id="favoriteCity">Keine gespeichert</div>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
